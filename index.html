<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
  <a-scene 
    mindar-image="imageTargetSrc: targets.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-assets>
      <video id="vid" src="video.mp4" loop muted playsinline></video>
    </a-assets>

    <a-entity mindar-image-target="targetIndex: 0"
      event-set__enter="_event: targetFound; visible: true"
      event-set__leave="_event: targetLost; visible: false">

      <a-video src="#vid" width="1" height="0.6" position="0 0 0"></a-video>

    </a-entity>

  </a-scene>

  <script>
    const video = document.querySelector("#vid");

    document.querySelector('a-scene').addEventListener("renderstart", () => {
      video.play();
    });
  </script>
</body>
</html>
